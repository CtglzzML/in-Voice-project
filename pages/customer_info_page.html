<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InVoice - Customer Info</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/invoice_library.css" />
    <link rel="stylesheet" href="../css/color_scheme.css" />
</head>

<body>
    <script src="../scripts/auth.js"></script>
    <script>
        requireAuthOrRedirect('customer_info_page.html');
    </script>

    <header class="dashboard-header">
        <img src="../images/logo.png" alt="inVoice Logo">

        <button class="user-button" type="button" aria-label="Account menu">
            <span>Welcome, User!</span>
            <span class="user-icon">◔</span>
        </button>
    </header>

    <div class="card">
        <div>
            <div class="" id="">
                <input type="text" class="" placeholder="search">
                <button type="submit" class="">🔍</button>
            </div>
            <ul class="suggestion-list hidden"></ul>
        </div>
        <table>
            <thead>
                <tr>
                    <th>File Name</th>
                    <th>Client Name</th>
                    <th>Client Email</th>
                    <th>VAT</th>
                    <th>Phone #</th>
                    <th>Country</th>
                    <th>City</th>
                    <th>Country Code</th>
                    <th>ID</th>
                    <th>Date</th>
                    <th></th>
                </tr>
            </thead>
        </table>
        <button type="button" id="add-line-item">+ Add Item</button>
    </div>

    <template id="empty-row">
        <tr>
            <td colspan="10">
                There are currently no clients in library.
            </td>
        </tr>
    </template>

    <template id="non-empty-row">
        <tr class="item-row">
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td class="">
                <input type="" class="" placeholder="">
            </td>
            <td>
                <button type="button" class="delete-btn">&times;</button>
            </td>
        </tr>
    </template>

    <template id="user-profile-menu">
        <div id="user-profile-menu-modal">
            <span id="username">Username</span>
            <a href="#" id="go-to-dashboard">Go to Dashboard</a>
            <a href="#" id="go-to-invoices">Invoice library</a>
            <a href="#" id="signout">Sign Out</a>
        </div>
    </template>

    <script src="../customer_info_page.js"></script>
</body>

</html>
