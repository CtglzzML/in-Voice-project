<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inVoice - Account</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/invoice_library.css" />
    <link rel="stylesheet" href="../css/color_scheme.css" />
</head>

<body>

    <script src="../scripts/auth.js"></script>
    <script>
        requireAuthOrRedirect('account_page.html');
    </script>

    <header class="dashboard-header">
      <div class="brand">
        <img src="../images/logo.png" alt="inVoice Logo">
        <span class="brand-dashboard">Account Profile</span>
      </div>

      <button class="user-button" type="button" aria-label="Account menu">
        <span class="user-icon">◔</span>
      </button>
    </header>

    <main>
        <div>
            <img src="" alt="Company Logo">
            <h2 class="account-username">Username</h2>
            <p class="account-email">email@website.com</p>
            <p class="account-company">Company Name</p>
        </div>
        <div>
            <button type="button" id="edit-account-btn">Edit Account</button>
            <button type="button" id="back-to-dashboard">Back to Dashboard</button>
        </div>
    </main>

    <template id="user-profile-menu">
        <div id="user-profile-menu-modal">
            <span id="username">Username</span>
            <a href="#" id="go-to-dashboard">Go to Dashboard</a>
            <a href="#" id="go-to-invoices">Invoice library</a>
            <a href="#" id="go-to-customers">Client directory</a>
            <a href="#" id="signout">Sign Out</a>
        </div>
    </template>

    <script src="../account.js"></script>
</body>

</html>
