<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inVoice - Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="../css/color_scheme.css" />
    <link rel="stylesheet" href="../css/login_page.css" />
</head>

<body>

    <header class="page-header">
        <div class="logo-wrapper">
            <a href="landing_page.html"><img src="../images/logo.png" alt="inVoice Logo" class="logo" /></a>
        </div>
    </header>

    <main class="login-page signup-page">
        <section class="login-container">
            <div class="login-card">
                <header class="login-card-header">
                    <h2>Create account</h2>
                </header>

                <form id="signup-form" class="login-form signup-form">
                    <div class="form-group">
                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" required autocomplete="username"
                            placeholder="you@company.com" />
                    </div>

                    <div class="form-group">
                        <label for="user-name">Full name</label>
                        <input type="text" id="user-name" required placeholder="Jane Doe" />
                    </div>

                    <div class="form-group">
                        <label for="user-username">Username <span class="label-optional">(optional)</span></label>
                        <input type="text" id="user-username" placeholder="jane_doe" />
                    </div>

                    <div class="form-group">
                        <label for="company-name">Company name <span class="label-optional">(optional)</span></label>
                        <input type="text" id="company-name" placeholder="Acme Inc." />
                    </div>

                    <div class="form-group">
                        <label for="user-logo">Company logo <span class="label-optional">(optional)</span></label>
                        <input type="file" id="user-logo" accept="image/*" />
                    </div>

                    <div class="form-group">
                        <label for="user-password">Password</label>
                        <input type="password" id="user-password" required autocomplete="new-password" minlength="6"
                            placeholder="At least 6 characters" />
                    </div>

                    <div class="login-button-wrapper">
                        <button type="submit" class="login-button">Create account</button>
                    </div>
                </form>
            </div>

            <div class="signup-section">
                <p>Already have an account?</p>
                <a href="login_page.html" class="signup-button">Log in</a>
            </div>
        </section>
    </main>

    <script src="../scripts/auth.js"></script>
    <script src="../signup.js"></script>
</body>

</html>
