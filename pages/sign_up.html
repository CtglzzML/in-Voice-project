<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inVoice - Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/invoice_library.css" />
    <link rel="stylesheet" href="../css/color_scheme.css" />
</head>

<body>
    <div class="brand">
        <span class="brand-in">in</span><span class="brand-voice">Voice</span>
        <span class="brand-dashboard">Sign Up</span>
    </div>

    <form id="signup-form" class="grid card" enctype="multipart/form-data">
        <div>
            <h2>Sign in details</h2>
        </div>
        
        <div>
            <label for="user-email">Email</label>
            <input type="email" id="user-email" name="email" required>
        </div>

        <div>
            <label for="user-name">Enter Full Name</label>
            <input type="text" id="user-name" name="full_name" required>
        </div>

        <div>
            <label for="user-username">Enter Username</label>
            <input type="text" id="user-username" name="username" required>
        </div>

        <div>
            <label for="company-name">Enter Company Name</label>
            <input type="text" id="company-name" name="company_name">
        </div>
        <div>
            <label for="user-logo">Company Logo</label>
            <input type="file" id="user-logo" name="logo" accept="image/*">
        </div>

        <div>
            <label for="user-password">Create Password</label>
            <input type="password" id="user-password" name="password" required>
        </div>

        <button type="submit">Create Account</button>
    </form>
</body>

</html>
