<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inVoice - Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="../css/color_scheme.css" />
    <link rel="stylesheet" href="../css/login_page.css" />
</head>

<body>

    <header class="page-header">
        <div class="logo-wrapper">
            <a href="landing_page.html"><img src="../images/logo.png" alt="inVoice Logo" class="logo" /></a>
        </div>
    </header>

    <main class="login-page signup-page">
        <section class="login-container">
            <div class="login-card">
                <header class="login-card-header">
                    <h2>Create account</h2>
                </header>

                <div id="signup-form" class="login-form signup-form" style="margin-top: 2rem; margin-bottom: 2rem;">
                    <div class="google-button-wrapper">
                        <button type="button" id="google-signup-btn" class="google-button">
                            <img src="../images/google-logo.svg" alt="" aria-hidden="true" class="google-icon" />
                            <span>Sign up with Google</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="signup-section">
                <p>Already have an account?</p>
                <a href="login_page.html" class="signup-button">Log in</a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../signup.js"></script>
</body>

</html>
