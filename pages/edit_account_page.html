<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inVoice - Edit Account</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="../css/color_scheme.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/account_page.css" />
    <link rel="stylesheet" href="../css/login_page.css" />
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/auth.js"></script>
    <script>
        requireAuthOrRedirect('edit_account_page.html');
    </script>

    <main class="dashboard-page">
        <header class="dashboard-header">
            <img src="../images/logo.png" alt="inVoice Logo">

            <button class="user-button" type="button" aria-label="Account menu">
                <span>Account Profile</span>
                <span class="user-icon"></span>
            </button>
        </header>

        <section class="dashboard-content">
            <article class="card">
                <div class="card-header">
                    <h2>Edit Account</h2>
                </div>
                <div class="card-body edit-form-card">
                    <form id="signup-form" class="login-form">
                        
                        <div class="form-group">
                            <label for="user-email">Email <span class="label-optional">(cannot be easily changed here)</span></label>
                            <input type="email" id="user-email" name="email" disabled>
                        </div>

                        <div class="form-group">
                            <label for="user-name">Full Name</label>
                            <input type="text" id="user-name" name="full_name" required>
                        </div>

                        <div class="form-group">
                            <label for="company-name">Company Name</label>
                            <input type="text" id="company-name" name="company_name">
                        </div>

                        <div class="form-group">
                            <label for="ob-siret">SIRET <span class="label-optional">(optional)</span></label>
                            <input type="text" id="ob-siret" name="siret" placeholder="12345678901234" />
                        </div>

                        <div class="form-group">
                            <label for="ob-address">Address <span class="label-optional">(optional)</span></label>
                            <input type="text" id="ob-address" name="address" placeholder="12 rue de la Paix, 75001 Paris" />
                        </div>

                        <div class="form-group">
                            <label for="ob-tva-number">TVA number <span class="label-optional">(optional)</span></label>
                            <input type="text" id="ob-tva-number" name="tva_number" placeholder="FR12345678901" />
                        </div>

                        <div class="form-group">
                            <label for="ob-default-tva">Default TVA rate (%) <span class="label-optional">(optional)</span></label>
                            <input type="number" id="ob-default-tva" name="default_tva" placeholder="20" min="0" max="100" step="0.1" />
                        </div>

                        <div class="form-group">
                            <label for="user-logo">Company Logo <span class="label-optional">(optional)</span></label>
                            <input type="file" id="user-logo" name="logo" accept="image/*">
                        </div>

                        <div class="action-row">
                            <button type="submit" id="apply-btn" class="btn btn-primary">Apply</button>
                            <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
                            <!-- <button type="button" id="delete-btn" class="btn btn-danger">Delete</button> -->
                        </div>
                    </form>
                </div>
            </article>
        </section>
    </main>
    <template id="user-profile-menu">
        <div id="user-profile-menu-modal" class="profile-menu">
            <div>
                <span class="profile-username" id="username">Username</span>
            </div>
            <div>
                <a href="dashboard.html" class="sign-out-link">Go to Dashboard</a>
                <a href="invoice_library.html" class="sign-out-link">Invoice library</a>
                <a href="account_page.html" class="sign-out-link">Account</a>
                <a href="#" class="sign-out-link" id="signout">Sign Out</a>
            </div>
        </div>
    </template>

    <script>
    (function() {
        var userBtn = document.querySelector('.user-button');
        var menuTpl = document.getElementById('user-profile-menu');
        if (!userBtn || !menuTpl) return;

        userBtn.addEventListener('click', function () {
            var existing = document.getElementById('user-profile-menu-modal');
            if (existing) { existing.remove(); return; }
            document.body.appendChild(menuTpl.content.cloneNode(true));

            var out = document.getElementById('signout');
            if (out) {
                out.addEventListener('click', function (e) {
                    e.preventDefault();
                    logoutUser().then(function () { window.location.href = 'landing_page.html'; });
                });
            }
        });

        document.addEventListener('click', function (e) {
            var modal = document.getElementById('user-profile-menu-modal');
            if (modal && !userBtn.contains(e.target) && !modal.contains(e.target)) modal.remove();
        });
    })();
    </script>

    <script src="../edit_account.js"></script>
</body>

</html>
