<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Create Invoice</title>
  <link rel="stylesheet" href="../styles.css" />
</head>

<body>

  <div class="invoice-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">

      <!-- Voice Control -->
      <div class="card">
        <h3>VOICE CONTROL</h3>
        <button class="record-btn">🎤 Start recording</button>

        <div id="suggestions">
          <p>Available voice commands</p>
          <ul>
            <li>"Invoice number 123"</li>
            <li>Company name</li>
            <li>Client name</li>
            <li>Product + quantity + price</li>
          </ul>
        </div>
      </div>

      <!-- Invoice Details -->
      <div class="card">
        <h3>INVOICE DETAILS</h3>

        <div class="grid">
          <input id="inv-number" placeholder="Invoice number">
          <label for="inv-date">Date:<input id="inv-date" type="date"></label>
          <label for="inv-due">Due:<input id="inv-due" type="date"></label>
          <input id="inv-tax" type="number" placeholder="Tax (%)">
        </div>

        <h4>Your company</h4>
        <div class="grid">
          <input id="company-name" placeholder="Company name">
          <input id="company-address" placeholder="Address">
          <input id="company-phone" placeholder="Phone">
          <input id="company-email" type="email" placeholder="Email">
        </div>

        <h4>Client</h4>
        <div class="grid">
          <input id="client-name" placeholder="Client name">
          <input id="client-address" placeholder="Address">
          <input id="client-phone" placeholder="Phone">
          <input id="client-email" type="email" placeholder="Email">
        </div>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

      <div class="preview-header">
        <button class="preview-btn">See preview</button>
      </div>

      <div class="invoice-editor-card">
        <h3>INVOICE</h3>
        <h4 class="">Item list</h4>
        <table id="items-table" class="table">
          <thead>
            <tr>
              <th>Description</th>
              <th>Qty</th>
              <th>Rate</th>
              <th>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="item-list">
          </tbody>
        </table>
        <button type="button" id="add-line-item">+ Add Item</button>

        <div class="totals">
          <p>Subtotal: <span id="view-subtotal">$0.00</span></p>
          <p>Tax: <span id="view-tax">$0.00</span></p>
          <p><strong>Total: <span id="view-total">$0.00</span></strong></p>
        </div>
      </div>

      <button class="return-btn">Return</button>

    </div>

  </div>

</body>

<template id="empty-row">
  <tr>
    <td colspan="5">
      There are currently no items in the invoice.
    </td>
  </tr>
</template>

<template id="non-empty-row">
  <tr class="item-row">
    <td>
      <input type="text" class="item-desc voice-input" placeholder="Service/Product">
    </td>
    <td>
      <input type="number" class="item-qty" value="1">
    </td>
    <td>
      <input type="number" class="item-rate" value="0.00">
    </td>
    <td class="item-total-cell">
      <span class="item-total">$0.00</span>
    </td>
    <td>
      <button type="button" class="delete-btn">&times;</button>
    </td>
  </tr>
</template>

</html>
