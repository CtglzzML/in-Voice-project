<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Create Invoice</title>
  <link rel="stylesheet" href="../styles.css" />
</head>

<body>

  <div class="invoice-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">

      <!-- Voice Control -->
      <div class="card">
        <h3>VOICE CONTROL</h3>
        <button class="record-btn">🎤 Start recording</button>

        <div id="suggestions">
          <p>Available voice commands</p>
          <ul>
            <li>"Invoice number 123"</li>
            <li>Company name</li>
            <li>Client name</li>
            <li>Product + quantity + price</li>
          </ul>
        </div>
      </div>

      <!-- Invoice Details -->
      <div class="card">
        <h3>INVOICE DETAILS</h3>

        <div class="grid">
          <input id="inv-number" placeholder="Invoice number">
          <input id="inv-date" placeholder="Date">
          <input id="inv-due" placeholder="Due date">
          <input id="inv-tax" placeholder="Tax (%)">
        </div>

        <h4>Your company</h4>
        <div class="grid">
          <input id="company-name" placeholder="Company name">
          <input id="company-address" placeholder="Address">
          <input id="company-phone" placeholder="Phone">
          <input id="company-email" placeholder="Email">
        </div>

        <h4>Client</h4>
        <div class="grid">
          <input id="client-name" placeholder="Client name">
          <input id="client-address" placeholder="Address">
          <input id="client-phone" placeholder="Phone">
          <input id="client-email" placeholder="Email">
        </div>

        <table id="items-table" class="table">
          <h4 class="">Item list</h4>
          <thead>
            <tr>
              <th>Description</th>
              <th>Qty</th>
              <th>Rate</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="item-list">
          </tbody>
        </table>
        <button type="button" id="add-line-item">+ Add Item</button>
        </table>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

      <div class="preview-header">
        <button class="preview-btn">See preview</button>
      </div>

      <div class="preview-card">
        <h3>INVOICE</h3>
        <p>No items yet</p>

        <div class="totals">
          <p>Subtotal: $0.00</p>
          <p>Tax: $0.00</p>
          <p><strong>Total: $0.00</strong></p>
        </div>
      </div>

      <button class="return-btn">Return</button>

    </div>

  </div>

</body>

</html>
