<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Create Invoice</title>
    <link rel="stylesheet" href="../css/color_scheme.css" />
    <link rel="stylesheet" href="../css/invoice_preview.css">
</head>

<body>
    <div class="card">
        <h2 class="card-title">Invoice Preview</h2>
        <div class="pdf-container">
            <iframe src="" width="100%" height="600px" style="border: none;">
                <p>Your browser does not support iframes.
                    <a href="../Copy of Modern-Invoice-Template-GDoc.pdf">Download the PDF</a> instead.
                </p>
            </iframe>
        </div>
    </div>

    <div class="card">
        <h2 class="card-title">Actions</h2>
        <button type="button" id="back-to-edit-btn" class="purple-btn">Back to edit</button>
        <button type="button" id="create-invoice-btn" class="orange-btn">Create invoice</button>
    </div>
</body>

<template id="invoice-created">
    <div id="created-modal" class="modal-window">
        <!--::before to add checkmark-->
        <p>Invoice Created!</p>
        <button id="login-to-save">Login to save invoice</button>

        <!--display this if already has an account-->
        <button id="go-to-dashboard" class="purple-btn">Go to dashboard</button>
        <button id="download-invoice" class="orange-btn">Download PDF</button>
    </div>
</template>

<template id="account-check">
    <div id="account-check-modal">
        <p>Already have an account?</p>
        <button id="has-account-yes-btn" class="purple-btn" name="has-account">Yes</button>
        <button id="has-account-no-btn" class="orange-btn" name="has-account">No</button>
    </div>
</template>

</html>
