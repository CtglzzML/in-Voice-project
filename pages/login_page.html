<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <title>inVOICE - Login</title>

    <link rel="stylesheet" href="../css/color_scheme.css" />
    <link rel="stylesheet" href="../css/login_page.css" />
</head>
<body>

    <header class="page-header">
        <div class="logo-wrapper">
            <img src="../images/logo.png" alt="inVOICE Logo" class="logo" />
        </div>
    </header>

    <main class="login-page">
        <section class="login-container">
            <div class="login-card">
                <header class="login-card-header">
                    <h2>Log in</h2>
                </header>

                <div class="login-form" style="margin-top: 2rem; margin-bottom: 2rem;">
                    <div class="google-button-wrapper">
                        <button type="button" class="google-button">
                            <span class="google-icon">G</span>
                            <span>Sign in with Google</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="signup-section">
                <p>Don't have an account?</p>
                <button type="button" class="signup-button">Sign Up</button>
                <a href="landing_page.html" class="back-to-landing-btn">
                    Go back to Landing Page
                </a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../login.js"></script>
</body>
</html>
