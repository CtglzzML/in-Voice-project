<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>

    <!--Invoice library list-->
    <!--Search bar-->
    <form class="" id="">
        <input type="text" class="" placeholder="search">
        <button type="submit" class="">🔍</button>
    </form>
    <!--Actual list-->
    <table>
        <thead>
            <tr>
                <th>File Name</th>
                <th>Client Name</th>
                <th>Client Email</th>
                <th>VAT</th>
                <th>Phone #</th>
                <th>Country</th>
                <th>City</th>
                <th>Country Code</th>
                <th>ID</th>
                <th>Date</th>
            </tr>
        </thead>
    </table>

    <!--Preview window-->
    <div id="">
        <h2 id="" class="">Placeholder title</h2>
        <a href="#" id=""><img src="" alt="three dots"></a>
        <div class="" id="">
            <iframe src="" width="100%" height="600px" style="border: none;">
                <p>Your browser does not support iframes.
                    <a href="../Copy of Modern-Invoice-Template-GDoc.pdf">Download the PDF</a> instead.
                </p>
            </iframe>
        </div>
        <div class="" id="">
            <span>Tags</span>
            <span class="flex" id="">
                <ul>
                </ul>
            </span>
        </div>
        <div class="" id="">
            <p>Description</p>
            <p id=""></p>
        </div>
    </div>
</body>
