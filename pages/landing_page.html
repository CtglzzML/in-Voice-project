<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inVoice</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/landing_page.css" />
  <link rel="stylesheet" href="../css/color_scheme.css" />
</head>

<body>
  <header class="page-header">
    <img src="../images/logo.png" alt="inVoice Logo">
    <button id="hamburger-btn">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="menu-container"></div>
  </header>

  <main class="hero">
    <section class="hero-content">
      <h1 class="hero-title">
        Create your invoice
        <span class="hero-title-accent">in seconds</span>
      </h1>

      <p class="hero-subtitle">No forms. No complexity. Just speak</p>

      <button class="mic-wrapper" id="recordBtn">
        <span class="mic-ring ring-1"></span>
        <span class="mic-ring ring-2"></span>
        <span class="mic-ring ring-3"></span>

        <span class="sound sound-left">
          <span></span>
          <span></span>
          <span></span>
        </span>

        <span class="sound sound-right">
          <span></span>
          <span></span>
          <span></span>
        </span>

        <span class="mic-circle">
          <span class="mic-icon"></span>
        </span>
      </button>

      <h2 class="speak-title">Speak your invoice</h2>
      <p class="speak-subtitle">You talk, we handle the rest.</p>
    </section>
  </main>

  <footer class="footer">
    <a href="#" class="contact-link">Contact us</a>
  </footer>
</body>

<template id="login-window">
  <div id="login-modal" class="modal-window">
    <div id="login-modal-header" class="box-title">
      <h2>Login</h2>
      <button type="button" class="close-modal">&times;</button>
    </div>
    <form id="login-form">
      <div id="login-modal-body" class="box-body">
        <div id="inputs">
          <label for="email-login">Email: <input id="email-login" type="email" name="login-info"></label>
          <label for="password-login">Password: <input id="password-login" type="password" name="login-info"></label>
        </div>
        <div id="login" class="button">
          <button>Login</button>
          <span>or</span>
          <button type="button" id="sign-in-google">Sign in with Google</button>
        </div>
        <hr id="sign-up-separator">
        <div id="sign-up-section" class="">
          <button id="sign-up-button">Sign up</button>
        </div>
      </div>
    </form>
  </div>
</template>

<template id="navigation-menu">
  <div id="navigation-menu-modal">
    <a href="invoice_library.html">Go to Invoice Library Page</a>
  </div>
</template>

<template id="login-signup">
  <a href="#" class="nav-button">Log In/Sign Up</a>
</template>

<template id="user-welcome">
  <button class="user-button" type="button">
        <span>Welcome, User!</span>
        <span class="user-icon">◔</span>
      </button>
</template>

<script src="../landing_page.js"></script>

</html>
