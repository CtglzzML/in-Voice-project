<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inVoice</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/landing_page.css" />
  <link rel="stylesheet" href="../css/color_scheme.css" />
</head>

<body>
  <header class="page-header page-header--guest" id="landing-header">
    <img src="../images/logo.png" alt="inVoice Logo">
    <div id="menu-container"></div>

    <button id="auth-btn" class="auth-btn" type="button">Sign In</button>

    <button id="hamburger-btn" type="button" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <main class="hero">
    <section class="hero-content">
      <h1 class="hero-title">
        Create your invoice
        <span class="hero-title-accent">in seconds</span>
      </h1>

      <p class="hero-subtitle">No forms. No complexity. Just speak</p>

      <button class="mic-wrapper" id="recordBtn" type="button">
        <span class="mic-ring ring-1"></span>
        <span class="mic-ring ring-2"></span>
        <span class="mic-ring ring-3"></span>

        <span class="sound sound-left">
          <span></span>
          <span></span>
          <span></span>
        </span>

        <span class="sound sound-right">
          <span></span>
          <span></span>
          <span></span>
        </span>

        <span class="mic-circle">
          <span class="mic-icon"></span>
        </span>
      </button>

      <h2 class="speak-title">Speak your invoice</h2>
      <p class="speak-subtitle">You talk, we handle the rest.</p>
    </section>
  </main>

  <footer class="footer">
    <a href="#" class="contact-link">Contact us</a>
  </footer>

  <template id="navigation-menu">
    <div id="navigation-menu-modal">
      <a href="invoice_library.html">Invoices</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="account_page.html">Account</a>
      <a href="#" id="landing-logout">Logout</a>
    </div>
  </template>

  <script src="../scripts/auth.js"></script>
  <script src="../landing_page.js"></script>

</body>

</html>
