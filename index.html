<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inVOICE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">
      <span class="logo-purple">in</span><span class="logo-orange">VOICE</span>
    </div>

    <a href="#" class="nav-button">Log In/Sign Up</a>
  </header>

  <main class="hero">
    <section class="hero-content">
      <h1 class="hero-title">
        Create your invoice
        <span class="hero-title-accent">in seconds</span>
      </h1>

      <p class="hero-subtitle">No forms. No complexity. Just speak</p>

      <button class="mic-wrapper" id="recordBtn" aria-label="Start voice recording">
        <span class="mic-ring ring-1"></span>
        <span class="mic-ring ring-2"></span>
        <span class="mic-ring ring-3"></span>

        <span class="sound sound-left">
          <span></span>
          <span></span>
          <span></span>
        </span>

        <span class="sound sound-right">
          <span></span>
          <span></span>
          <span></span>
        </span>

        <span class="mic-circle">
          <span class="mic-icon"></span>
        </span>
      </button>

      <h2 class="speak-title">Speak your invoice</h2>
      <p class="speak-subtitle">You talk, we handle the rest.</p>
    </section>
  </main>

  <footer class="footer">
    <a href="#" class="contact-link">Contact us</a>
  </footer>
</body>
</html>
