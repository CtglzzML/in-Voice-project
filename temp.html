<div id="login-modal" class="modal-window">
    <div id="login-modal-header" class="box-title">
        <h2>Login</h2>
        <button type="button" class="close-modal">&times;</button>
    </div>
    <form id="login-form">
        <div id="login-modal-body" class="box-body">
            <div id="inputs">
                <label for="email-login">Email: <input id="email-login" type="email" name="email"></label>
                <label for="password-login">Password: <input id="password-login" type="password" name="password"></label>
            </div>
            <div id="login-button" class="login-button">
                <button>Login</button>
                <span>or</span>
                <button type="button" id="sign-in-google">Sign in with Google</button>
            </div>
            <hr id="sign-up-separator">
            <div id="sign-up-section" class="">
                <button id="sign-up-button">Sign up</button>
            </div>
        </div>
    </form>
</div>
